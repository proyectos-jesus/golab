<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Detalle de producto GOLAB — Gomitas funcionales naturales bolivianas.">
  <title>Producto — GOLAB</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

  <nav id="navbar" class="navbar--white">
    <div class="nav-inner">
      <a href="../index.html" class="nav-logo">
        <span class="nav-logo-text">GOLAB</span>
      </a>
      <ul id="nav-menu">
        <li><a href="../index.html" class="nav-link">Inicio</a></li>
        <li><a href="catalogo.html" class="nav-link">Productos</a></li>
        <li><a href="blog.html" class="nav-link">Blog</a></li>
        <li><a href="../index.html#faq" class="nav-link">FAQ</a></li>
      </ul>
      <div class="nav-actions">
        <a href="../carrito.html" class="nav-cart" aria-label="Ver carrito">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"></path>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <path d="M16 10a4 4 0 01-8 0"></path>
          </svg>
          <span class="cart-badge">0</span>
        </a>
        <button class="nav-toggle" id="nav-toggle"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>

  <div class="product-detail-hero">
    <div class="container">
      <div style="padding-top:calc(var(--nav-height) + 1.5rem);">
        <div class="breadcrumb">
          <a href="../index.html">Inicio</a> /
          <a href="catalogo.html">Catálogo</a> /
          <span id="breadcrumb-name">Producto</span>
        </div>
      </div>
      <div id="product-detail">
        <!-- Rendered by script.js -->
        <div style="grid-column:1/-1;text-align:center;padding:6rem 0;">
          <div style="width:40px;height:40px;border:3px solid var(--color-green);border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem;"></div>
          <p style="color:var(--color-muted);">Cargando producto...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Related Products -->
  <section class="section--sm" style="background:var(--color-cream);">
    <div class="container">
      <div class="section-header" style="margin-bottom:var(--space-xl);">
        <span class="section-eyebrow">También te puede gustar</span>
        <h2 class="section-title" style="font-size:1.8rem;">Otros productos GOLAB</h2>
      </div>
      <div class="product-grid" id="related-products"></div>
    </div>
  </section>

  <footer>
    <div class="container">
      <div class="footer-bottom" style="border-top:none;padding:var(--space-xl) 0;">
        <p>© 2025 GOLAB Bolivia.</p>
        <a href="catalogo.html" style="color:rgba(255,255,255,0.5);font-size:0.8rem;">← Volver al catálogo</a>
      </div>
    </div>
  </footer>

  <a href="https://wa.me/59163738105" target="_blank" class="whatsapp-float" aria-label="WhatsApp">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  </a>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script src="../js/products.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/script.js"></script>
  <script>
    // Related products
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const id = parseInt(params.get('id'));
      const related = GOLAB_PRODUCTS.filter(p => p.id !== id);
      const relGrid = document.getElementById('related-products');
      const breadName = document.getElementById('breadcrumb-name');
      const current = GOLAB_PRODUCTS.find(p => p.id === id);
      if (current && breadName) breadName.textContent = current.name;
      if (relGrid) {
        relGrid.innerHTML = related.map(p => `
          <article class="product-card" style="--accent:${p.color}">
            <a href="producto.html?id=${p.id}" class="product-card__link">
              <div class="product-card__image" style="background:${p.color}15;">
                <img src="../${p.image}" alt="${p.name}" loading="lazy" onerror="this.parentElement.classList.add('product-card__image--placeholder')">
                ${p.tag ? `<span class="product-card__badge" style="background:${p.color}">${p.tag}</span>` : ''}
              </div>
              <div class="product-card__body">
                <h3 class="product-card__name">${p.name}</h3>
                <p class="product-card__tagline">${p.tagline}</p>
                <div class="product-card__footer">
                  <span class="product-card__price">${p.currency} ${p.price}</span>
                  <button class="btn-add-cart" onclick="event.preventDefault();Cart.add(${p.id})">
                    + Agregar
                  </button>
                </div>
              </div>
            </a>
          </article>
        `).join('');
      }
    });
  </script>
</body>
</html>
